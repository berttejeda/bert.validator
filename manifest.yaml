# Define variables available to the template engine
templateVars:
  app_name: "MyApp"

# Global default interpreter and settings
defaults:
  interpreter: "/bin/bash"
  show_output: false

# Define reusable script functions
functions:
  - name: my_shared_func
    interpreters: [sh, bash, zsh]
    script: |
      echo "This is a shared utility"

# Global script variables mapped to environment
vars:
  global_var: 123

# The actual assertions/validations to run
validations:
  - name: "From other"
    show_output: true
    includes:
      - name: other
        path: other-manifest.yaml
        vars:
          myvar: "$(echo MyyyyyVarrrrr)"
        propagate_tags: false
    tags:
      - gabbledegak
  - name: "Check File Exists"
    tags:
      - "system"
      - "core"
    script: |
      my_shared_func
      if [ -f "/etc/hosts" ]; then
        echo "{{ .app_name }} config found"
        exit 0
      elif [ ! -s "/etc/hosts" ]; then
        exit 2
      else
        exit 1
      fi
    outcomes:
      warn:
        message: "File is present, but empty"
        exit_codes: 
          - 2
      pass:
        message: "File is present"
        exit_codes: 
          - 0
      fail:
        message: "File is missing"

  - name: "SkipMe"
    tags: ["other"]
    script: echo "Running SkipMe"
    show_output: true

  - name: "RunAlso"
    tags: ["run"]
    script: echo "Running RunAlso"
    show_output: true

  - name: "RunMyTag"
    tags: ["my_tag"]
    script: echo "Running RunMyTag"
    show_output: true
